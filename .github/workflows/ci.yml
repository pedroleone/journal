name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          TURSO_DATABASE_URL: file:ci.db
          SESSION_SECRET: ci-secret-for-build
          PASSWORD_HASH: unused
          NEXT_PUBLIC_PBKDF2_SALT: dGVzdC1zYWx0
